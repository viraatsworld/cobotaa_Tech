controller_manager:
  ros__parameters:
    update_rate: 125  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    denso_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - cobotta_pro_joint_1
      - cobotta_pro_joint_2
      - cobotta_pro_joint_3
      - cobotta_pro_joint_4
      - cobotta_pro_joint_5
      - cobotta_pro_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 500
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

denso_joint_trajectory_controller:
  ros__parameters:
    joints:
      - cobotta_pro_joint_1
      - cobotta_pro_joint_2
      - cobotta_pro_joint_3
      - cobotta_pro_joint_4
      - cobotta_pro_joint_5
      - cobotta_pro_joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 500
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0

